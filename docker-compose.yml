# Docker Compose for the University Lab Scheduler.
# Usage:
#   cp .env.example .env      # then edit values
#   docker compose up -d --build
#   open http://localhost:8501

services:
  lab-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: university-lab-scheduler:latest
    container_name: lab-scheduler
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8501}:8501"
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      STREAMLIT_SERVER_PORT: "8501"
      STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    env_file:
      - .env
    volumes:
      # Persist logs and generated outputs on the host.
      - ./logs:/app/logs
      - ./outputs:/app/outputs
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
